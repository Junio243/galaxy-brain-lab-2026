<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: Arial, sans-serif;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .status {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            font-weight: bold;
        }
        .active {
            background-color: #d4edda;
            color: #155724;
        }
        .inactive {
            background-color: #f8d7da;
            color: #721c24;
        }
        .controls {
            text-align: center;
        }
        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .freeze-btn {
            background-color: #dc3545;
            color: white;
        }
        .unfreeze-btn {
            background-color: #28a745;
            color: white;
        }
        .info {
            margin-top: 20px;
            padding: 10px;
            background-color: #e9ecef;
            border-radius: 5px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h2>Lovable Credit Freeze</h2>
        <div id="status" class="status inactive">Desativado</div>
    </div>
    
    <div class="controls">
        <button id="toggleBtn" class="freeze-btn">Congelar Créditos</button>
    </div>
    
    <div class="info">
        <p><strong>Como usar:</strong></p>
        <ul>
            <li>Clique em "Congelar Créditos" para ativar</li>
            <li>A extensão impedirá o consumo de créditos</li>
            <li>Reinicie o navegador para desativar completamente</li>
        </ul>
    </div>

    <script src="popup.js"></script>
</body>
</html>
